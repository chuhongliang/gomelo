syntax = "proto3";

package gomelo;

option go_package = "gomelo/proto";

message Player {
    string id = 1;
    string name = 2;
    int32 level = 3;
    int32 exp = 4;
    int64 gold = 5;
}

message Room {
    string id = 1;
    string name = 2;
    repeated string player_ids = 3;
    int32 max_players = 4;
    int32 state = 5;
}

message Vector3 {
    float x = 1;
    float y = 2;
    float z = 3;
}

message Position {
    Vector3 pos = 1;
    Vector3 rot = 2;
    int64 timestamp = 3;
}

message ChatMessage {
    string from_id = 1;
    string to_id = 2;
    string content = 3;
    int64 timestamp = 4;
    int32 channel = 5;
}

message EntryRequest {
    string name = 1;
}

message EntryResponse {
    int32 code = 1;
    string message = 2;
    Player player = 3;
}

message MoveRequest {
    Vector3 position = 1;
    Vector3 rotation = 2;
}

message MoveResponse {
    int32 code = 1;
    Position position = 2;
}
